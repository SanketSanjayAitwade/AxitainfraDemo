# Netlify configuration for Axita Infrastructure ERP
# https://docs.netlify.com/configure-builds/get-started/
#
# SSR routing and the serverless function are handled automatically by
# @netlify/vite-plugin-tanstack-start (emits .netlify/v1/functions/server.mjs
# with a catch-all path config) — no manual [[redirects]] needed.

[build]
  command = "npm run build"
  publish = "dist/client"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"
