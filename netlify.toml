# Netlify configuration for Axita Infrastructure ERP
# https://docs.netlify.com/configure-builds/get-started/

[build]
  # Build command - Nitro will auto-detect Netlify environment
  command = "NITRO_PRESET=netlify npm run build"
  # Publish directory containing static assets
  publish = "dist"
  # Functions directory (internal, auto-generated during build)
  functions = ".netlify/functions-internal"

# Redirect all non-matching routes to the SSR handler for TanStack Start
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

# Cache busting for index.html
[[headers]]
  for = "/"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"
    x-content-type-options = "nosniff"

[[headers]]
  for = "/*.html"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"
